name: Sync Fork
on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight
  workflow_dispatch: 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          set -euo pipefail
          git remote add upstream https://github.com/codenotary/immudb.git
          git fetch upstream --prune

          # Resolve upstream default branch (e.g. master/main)
          UPSTREAM_DEFAULT_BRANCH="$(git remote show upstream | sed -n '/HEAD branch/s/.*: //p')"
          echo "Upstream default branch: ${UPSTREAM_DEFAULT_BRANCH}"

          git checkout "${GITHUB_REF_NAME}"
          git rebase "upstream/${UPSTREAM_DEFAULT_BRANCH}"
          git push --force-with-lease origin "${GITHUB_REF_NAME}"
