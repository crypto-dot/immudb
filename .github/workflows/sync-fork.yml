name: Sync Fork
on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight
  workflow_dispatch: 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          git remote add upstream https://github.com/original/repo.git
          git fetch upstream
          git rebase upstream/main
          git push --force-with-lease
